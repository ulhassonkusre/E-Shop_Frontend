<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <p class="auth-subtitle">Welcome back! Please login to continue.</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
          [disabled]="isLoading"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            required
            [disabled]="isLoading"
          />
          <button type="button" class="password-toggle" (click)="togglePassword()" tabindex="-1">
            <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? 
      <button type="button" class="auth-footer-link" (click)="goToSignup()">Sign up</button>
    </p>
  </div>
</div>
